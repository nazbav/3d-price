<!DOCTYPE html>
<html>
<head>
    <title>ID Normalization Test</title>
</head>
<body>
    <h1>ID Normalization Test</h1>
    <div id="output"></div>
    
    <script src="utils/normalizeIds.js"></script>
    <script>
        // Test data with problematic IDs
        const testData = {
            printers: [
                { id: "printer_1", name: "Printer A", profileIds: ["profile_1", "profile_2"] },
                { id: 123, name: "Printer B", profileIds: [456] },
                { id: "xyz", name: "Printer C", profileIds: [] }
            ],
            materials: [
                { id: "mat_1", name: "PLA", printers: ["printer_1", 123], profileIds: ["profile_1"] },
                { id: 999, name: "PETG", printers: [], profileIds: [] }
            ],
            materialProfiles: [
                { id: "profile_1", name: "PLA Profile" },
                { id: 456, name: "PETG Profile" }
            ],
            printerProfiles: [
                { id: "profile_1", printerId: "printer_1", name: "Profile A" },
                { id: 456, printerId: 123, name: "Profile B" }
            ],
            additionalGlobal: [
                { id: "add_1", description: "Global expense", printers: ["printer_1"] }
            ],
            clients: [
                { id: "client_1", name: "John Doe" },
                { id: 999, name: "Jane Smith" }
            ],
            calcHistory: [
                { 
                    id: "calc_1", 
                    clientId: "client_1",
                    details: [
                        { printerId: "printer_1", materialId: "mat_1" }
                    ],
                    calcData: {
                        "printer_1": [
                            { materialId: "mat_1" }
                        ]
                    }
                }
            ]
        };

        function runTest() {
            const output = document.getElementById('output');
            output.innerHTML = '<h2>Running tests...</h2>';

            // Create a copy for testing
            const testDataCopy = JSON.parse(JSON.stringify(testData));

            // Test 1: Validate original data (should fail)
            output.innerHTML += '<h3>Test 1: Validate original data</h3>';
            const validation1 = validateUniqueIds(testDataCopy);
            output.innerHTML += `<p>Validation success: ${validation1.success}</p>`;
            output.innerHTML += `<p>Errors: ${JSON.stringify(validation1.errors)}</p>`;

            // Test 2: Just normalize without ensureNumericIds first
            output.innerHTML += '<h3>Test 2: Direct normalize (skip ensureNumericIds)</h3>';
            const testDataCopy2 = JSON.parse(JSON.stringify(testData));
            normalizeIds(testDataCopy2);
            output.innerHTML += `<p>After direct normalizeIds:</p>`;
            output.innerHTML += `<pre>${JSON.stringify(testDataCopy2, null, 2)}</pre>`;

            // Test 3: Validate normalized data (should pass)
            output.innerHTML += '<h3>Test 3: Validate normalized data</h3>';
            const validation2 = validateUniqueIds(testDataCopy2);
            output.innerHTML += `<p>Validation success: ${validation2.success}</p>`;
            output.innerHTML += `<p>Errors: ${JSON.stringify(validation2.errors)}</p>`;

            output.innerHTML += '<h2>Tests completed!</h2>';
        }

        // Run tests when page loads
        window.onload = runTest;
    </script>
</body>
</html>
