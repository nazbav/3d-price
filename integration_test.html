<!DOCTYPE html>
<html>
<head>
    <title>Integration Test</title>
</head>
<body>
    <h1>Integration Test for Receipt Fix</h1>
    <div id="result"></div>
    
    <script>
        // Copy the key parts from the actual application to test
        const appData = {
            calcHistory: [],
            counters: { orders: 0 }
        };
        
        function getNextId(type) {
            if (!appData.counters) appData.counters = {};
            if (!appData.counters[type]) appData.counters[type] = 0;
            return ++appData.counters[type];
        }
        
        function saveToLocalStorage() {
            // Simulate saving to localStorage
            console.log("Data saved to localStorage");
        }
        
        // Simulate the calculation creation process
        function createCalculation(calcName, manualOrderId = null) {
            console.log(`\n=== Creating calculation: ${calcName} ===`);
            
            // Simulate getting the order ID (this is the key part that can cause the bug)
            let orderId = manualOrderId || getNextId('orders');
            console.log("Order ID:", orderId, typeof orderId);
            
            // Check if there's an existing calculation with the same name
            const existingIndex = appData.calcHistory.findIndex(entry => entry.calcName === calcName);
            
            // Create the calculation data (simplified)
            const lastCalcFullData = {
                id: orderId,
                calcName: calcName,
                total: 1000,
                nalogReceipts: []
            };
            
            // Create the history entry
            const newEntry = {
                id: orderId,
                timestamp: Date.now(),
                calcName: calcName,
                total: 1000,
                nalogReceipts: []
            };
            
            // Save to history (same logic as the real app)
            if (existingIndex !== -1) {
                appData.calcHistory[existingIndex] = newEntry;
                console.log("Updated existing entry at index:", existingIndex);
            } else {
                appData.calcHistory.push(newEntry);
                console.log("Created new entry at index:", appData.calcHistory.length - 1);
            }
            
            saveToLocalStorage();
            
            return lastCalcFullData;
        }
        
        // Simulate the receipt sending process (the fixed version)
        function sendReceipt(lastCalcFullData) {
            console.log(`\n=== Sending receipt for calculation: ${lastCalcFullData.calcName} ===`);
            console.log("Looking for ID:", lastCalcFullData.id, typeof lastCalcFullData.id);
            
            // The FIXED version with String conversion
            const idx = appData.calcHistory.findIndex(e => String(e.id) === String(lastCalcFullData.id));
            console.log("Found entry at index:", idx);
            
            if (idx !== -1) {
                const recList = Array.isArray(appData.calcHistory[idx].nalogReceipts) 
                    ? appData.calcHistory[idx].nalogReceipts : [];
                    
                const receiptData = {
                    uuid: "receipt-" + Date.now(),
                    inn: "123456789",
                    canceled: false
                };
                
                recList.push(receiptData);
                appData.calcHistory[idx].nalogReceipts = recList;
                
                // Also update the current calculation data
                if (!Array.isArray(lastCalcFullData.nalogReceipts)) {
                    lastCalcFullData.nalogReceipts = [];
                }
                lastCalcFullData.nalogReceipts.push(receiptData);
                
                saveToLocalStorage();
                console.log("✅ Receipt saved successfully!");
                console.log("Receipt data:", receiptData);
                return true;
            } else {
                console.log("❌ Failed to find calculation entry - receipt NOT saved!");
                return false;
            }
        }
        
        // Test scenarios
        console.log("Starting Integration Tests...");
        
        // Scenario 1: Auto-generated ID (number)
        const calc1 = createCalculation("Auto ID Test");
        const success1 = sendReceipt(calc1);
        
        // Scenario 2: Manual string ID (simulating user input)
        const calc2 = createCalculation("Manual ID Test", "ORDER-123");
        const success2 = sendReceipt(calc2);
        
        // Scenario 3: The problematic case - mixed types
        // Create with number ID, then simulate the ID becoming a string
        const calc3 = createCalculation("Mixed Type Test");
        calc3.id = String(calc3.id); // Convert to string (simulates the bug scenario)
        console.log("Converted calc3.id to string:", calc3.id, typeof calc3.id);
        const success3 = sendReceipt(calc3);
        
        // Summary
        console.log("\n=== Final Results ===");
        console.log("Test 1 (Auto ID):", success1 ? "✅ PASS" : "❌ FAIL");
        console.log("Test 2 (Manual ID):", success2 ? "✅ PASS" : "❌ FAIL");
        console.log("Test 3 (Mixed Types):", success3 ? "✅ PASS" : "❌ FAIL");
        
        console.log("\nFinal calcHistory:");
        appData.calcHistory.forEach((entry, idx) => {
            console.log(`${idx}: ID=${entry.id}(${typeof entry.id}), Name=${entry.calcName}, Receipts=${entry.nalogReceipts.length}`);
        });
        
        // Display results
        document.getElementById('result').innerHTML = `
            <h2>Integration Test Results</h2>
            
            <h3>Test Scenarios:</h3>
            <p><strong>Test 1 - Auto-generated ID (number):</strong> ${success1 ? '✅ PASS' : '❌ FAIL'}</p>
            <p><strong>Test 2 - Manual string ID:</strong> ${success2 ? '✅ PASS' : '❌ FAIL'}</p>
            <p><strong>Test 3 - Mixed types (the bug scenario):</strong> ${success3 ? '✅ PASS' : '❌ FAIL'}</p>
            
            <h3>Final Data State:</h3>
            <table border="1" style="border-collapse: collapse; margin: 10px 0;">
                <tr><th>Index</th><th>ID</th><th>Type</th><th>Name</th><th>Receipts</th></tr>
                ${appData.calcHistory.map((entry, idx) => `
                    <tr>
                        <td>${idx}</td>
                        <td>${entry.id}</td>
                        <td>${typeof entry.id}</td>
                        <td>${entry.calcName}</td>
                        <td>${entry.nalogReceipts.length}</td>
                    </tr>
                `).join('')}
            </table>
            
            <h3>Overall Result:</h3>
            <p style="color: ${success1 && success2 && success3 ? 'green' : 'red'}; font-size: 18px; font-weight: bold;">
                ${success1 && success2 && success3 ? '🎉 ALL TESTS PASSED - Fix is working!' : '⚠️ Some tests failed'}
            </p>
        `;
    </script>
</body>
</html>
